services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: essk
      POSTGRES_USER: essk
      POSTGRES_PASSWORD: essk
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U essk -d essk"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../..
      dockerfile: infra/docker/backend.Dockerfile
    environment:
      ESSK_APP_ENV: local
      ESSK_APP_NAME: ESSK Backend
      ESSK_BACKEND_PORT: 8080
      ESSK_CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost
      ESSK_LOG_PRETTY: "false"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: essk
      POSTGRES_USER: essk
      POSTGRES_PASSWORD: essk
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ISSUER: essk
      JWT_SIGNING_KEY: change-me-local-only
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
    environment:
      NEXT_PUBLIC_APP_NAME: ESSK
      NEXT_PUBLIC_API_BASE_URL: http://localhost/api/v1
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - backend

volumes:
  postgres-data:
